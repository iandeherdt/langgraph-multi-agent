services:
  langgraph:
    build: .
    env_file: .env
    depends_on:
      - playwright-mcp
    volumes:
      - .:/app:ro
      - ./workspace:/workspace
    ports:
      # Expose Next.js dev server (or any builder-spawned server) to the host browser.
      - "3000:3000"
    stdin_open: true
    tty: true

  # Playwright MCP server — gives the evaluator browser_navigate / browser_take_screenshot etc.
  # The langgraph container reaches it via service DNS (http://playwright-mcp:8931/sse).
  #
  # @playwright/mcp is PINNED. Floating @latest broke once already (the --transport flag was
  # removed in a newer release without warning). When bumping the pin, run
  # `npx -y @playwright/mcp@<new> --help` first and confirm --port + --host + --headless still
  # exist, then verify the langgraph container can curl the /sse endpoint.
  # TODO (v1.4): bake @playwright/mcp into the image so we stop fetching from npm at startup.
  playwright-mcp:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    # List-form so YAML folding + shell quoting can't mangle args (esp. --allowed-hosts).
    command:
      - npx
      - -y
      - "@playwright/mcp@0.0.73"
      - --port
      - "8931"
      - --host
      - 0.0.0.0
      - --headless
      # 0.0.73 added a host-check that 403s anything not matching the bind host. Comparison
      # is on the literal Host: header (including port), so we list each "name:port" combo
      # we expect: docker service DNS (how langgraph reaches it) and host-side dev.
      - --allowed-hosts
      - playwright-mcp:8931,localhost:8931
    ports:
      - "8931:8931"

  # Local Qwen3.6 via llama.cpp. Enable with: docker compose --profile local up -d llama-cpp
  llama-cpp:
    profiles: [local]
    image: ghcr.io/ggml-org/llama.cpp:server-vulkan
    ports:
      - "8080:8080"
    volumes:
      - ./models:/models
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
    command: >
      -m /models/Qwen3.6-35B-A3B-UD-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      -c 32768
      -ngl 999
      --jinja
      --alias qwen3.6
